name: Build library and examples

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Ubuntu GCC
            os: ubuntu-latest
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
          - label: Ubuntu Clang
            os: ubuntu-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
          - label: Windows MSVC
            os: windows-latest
            build_type: Release
            c_compiler: cl
            cpp_compiler: cl
          - label: Windows MSYS2 MINGW64 GCC
            os: windows-latest
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
            msys2_env: MINGW64
          - label: Windows MSYS2 MINGW64 Clang
            os: windows-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
            msys2_env: MINGW64
          - label: Windows MSYS2 UCRT64 GCC
            os: windows-latest
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
            msys2_env: UCRT64
          - label: Windows MSYS2 UCRT64 Clang
            os: windows-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
            msys2_env: UCRT64
          - label: Windows MSYS2 CLANG64 Clang
            os: windows-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
            msys2_env: CLANG64
          - label: macOS Clang
            os: macos-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: lukka/get-cmake@latest
        with:
          ninja: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config \
            wayland-protocols

      - name: Set up MSVC environment
        if: runner.os == 'Windows' && !matrix.msys2_env
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup MSYS2 (GCC)
        if: matrix.msys2_env && matrix.c_compiler == 'gcc'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys2_env }}
          update: true
          install: >-
            base-devel
            git
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p

      - name: Setup MSYS2 (Clang)
        if: matrix.msys2_env && matrix.c_compiler == 'clang'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys2_env }}
          update: true
          install: >-
            base-devel
            git
          pacboy: >-
            clang:p
            cmake:p
            ninja:p

      - name: Set regular paths
        if: ${{ !matrix.msys2_env }}
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Set MSYS2 paths
        if: matrix.msys2_env
        id: msys2_strings
        shell: msys2 {0}
        run: |
          echo "build-output-dir=$(cygpath -u '${{ github.workspace }}')/build" >> "$GITHUB_OUTPUT"
          echo "source-dir=$(cygpath -u '${{ github.workspace }}')" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (MSYS2)
        if: matrix.msys2_env
        shell: msys2 {0}
        run: >
          cmake -B ${{ steps.msys2_strings.outputs.build-output-dir }}
          -G Ninja
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DRLHB_BUILD_EXAMPLES=ON
          -DRLHB_FETCH_RAYLIB=ON
          -S ${{ steps.msys2_strings.outputs.source-dir }}

      - name: Configure CMake (Regular)
        if: ${{ !matrix.msys2_env }}
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -G Ninja
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DRLHB_BUILD_EXAMPLES=ON
          -DRLHB_FETCH_RAYLIB=ON
          -S ${{ github.workspace }}

      - name: Build (MSYS2)
        if: matrix.msys2_env
        shell: msys2 {0}
        run: cmake --build ${{ steps.msys2_strings.outputs.build-output-dir }} --parallel 4

      - name: Build (Regular)
        if: ${{ !matrix.msys2_env }}
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --parallel 4
